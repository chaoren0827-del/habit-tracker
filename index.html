<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Habits">
  <meta name="theme-color" content="#FAF8F3">
  <title>Daily Habits</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    /* ── Design tokens ──────────────────────────────────── */
    :root {
      --bg:           #FAF8F3;
      --surface:      #FFFFFF;
      --surface-done: #F0EDE4;
      --surface2:     #F5F2EB;
      --border:       #EDE9DE;
      --border-empty: #D4CFBF;
      --text:         #3A3833;
      --text2:        #8A8676;
      --text3:        #B8B5A8;
      --sage:         #B8C5A6;
      --accent:       #C97B5A;
      --accent-ring:  rgba(201,123,90,0.15);
      --danger:       #C17B6A;
      --r:            14px;
      --st:           env(safe-area-inset-top, 0px);
      --sb:           env(safe-area-inset-bottom, 0px);
    }

    /* ── Base ───────────────────────────────────────────── */
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App shell ──────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 420px;
      margin: 0 auto;
    }

    /* ── Views ──────────────────────────────────────────── */
    .view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .view.active { display: flex; }

    .scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 16px;
    }

    /* ── Today header ───────────────────────────────────── */
    .today-header {
      padding: calc(var(--st) + 24px) 22px 20px;
    }
    .header-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .progress-ring { flex-shrink: 0; }
    #ring-arc {
      transition: stroke-dashoffset 0.25s ease-in-out;
    }
    #ring-label {
      font-size: 16px;
      font-weight: 500;
      fill: #3A3833;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .header-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .today-date-label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text3);
    }
    .today-greeting {
      font-size: 19px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.25;
    }

    /* ── Hidden legacy progress elements (JS compat) ───── */
    .progress-wrap { display: none; }
    .today-sub     { display: none; }

    /* ── All-done banner ────────────────────────────────── */
    .all-done-banner {
      margin: 0 16px 12px;
      padding: 12px 16px;
      background: var(--surface-done);
      border-radius: var(--r);
      font-size: 13px;
      color: var(--text2);
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.35s, max-height 0.35s, margin 0.35s;
    }
    .all-done-banner.show { opacity: 1; max-height: 60px; }

    /* ── Habit list ─────────────────────────────────────── */
    .habit-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .habit-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 14px;
      background: var(--surface);
      border-radius: var(--r);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.25s ease-in-out, border-color 0.25s ease-in-out,
                  box-shadow 0.25s ease-in-out, opacity 0.15s;
      user-select: none;
      -webkit-user-select: none;
      min-height: 44px;
      position: relative;
    }
    .habit-item:active { opacity: 0.65; }
    .habit-item.done {
      background: var(--surface-done);
      border-color: transparent;
    }

    /* Checkbox circle */
    .check-ring {
      width: 22px; height: 22px;
      min-width: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border-empty);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.25s ease-in-out, border-color 0.25s ease-in-out;
    }
    .habit-item.done .check-ring {
      background: var(--sage);
      border-color: var(--sage);
    }
    .check-ring svg {
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.25s ease-in-out, transform 0.25s ease-in-out;
    }
    .habit-item.done .check-ring svg { opacity: 1; transform: scale(1); }

    /* Habit icon */
    .habit-icon { flex-shrink: 0; }

    /* Text */
    .habit-body { flex: 1; min-width: 0; }
    .habit-name {
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      transition: color 0.25s ease-in-out;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .habit-item.done .habit-name {
      text-decoration: line-through;
      text-decoration-color: var(--text3);
      color: #A8A496;
    }
    .habit-meta {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }
    .streak-accent { color: var(--accent); }

    /* Empty state */
    .empty-state {
      padding: 64px 32px;
      text-align: center;
      color: var(--text2);
      font-size: 15px;
      line-height: 1.7;
    }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }

    /* ── Section header ─────────────────────────────────── */
    .section-header {
      padding: calc(var(--st) + 28px) 22px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-title {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    /* ── Manage list ────────────────────────────────────── */
    .manage-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .manage-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      min-height: 44px;
    }
    .manage-item-body { flex: 1; min-width: 0; }
    .manage-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .manage-sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }
    .manage-sub:empty { display: none; }
    .manage-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 36px; height: 36px;
      min-width: 36px;
      border-radius: 10px;
      border: none;
      background: var(--surface2);
      color: var(--text2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn.edit:active { background: rgba(201,123,90,0.12); color: var(--accent); }
    .icon-btn.del { background: rgba(193,123,106,0.07); color: var(--danger); }

    /* Add link */
    .add-link-wrap {
      padding: 20px 16px 8px;
      text-align: center;
    }
    .add-link {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      color: var(--accent);
      cursor: pointer;
      padding: 8px 20px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }
    .add-link:active { opacity: 0.55; }

    /* ── History ────────────────────────────────────────── */
    .history-controls {
      padding: 0 16px 4px;
      display: flex;
      gap: 6px;
    }
    .range-pill {
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      min-height: 36px;
    }
    .range-pill.active {
      background: rgba(201,123,90,0.08);
      border-color: var(--accent);
      color: var(--accent);
    }

    .history-block {
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
    }
    .history-block:last-child { border-bottom: none; }
    .history-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .history-habit-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .history-streak-label { font-size: 12px; color: var(--accent); }
    .history-streak-label.hot { color: var(--accent); }

    .dot-row { display: flex; gap: 3px; }
    .dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex: 1;
      min-width: 0;
    }
    .dot {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 4px;
      background: var(--border);
      transition: background 0.2s;
      min-width: 8px;
      max-width: 28px;
    }
    .dot.done { background: var(--sage); }
    .dot.today { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3.5px var(--sage); }
    .dot.future { opacity: 0.3; }
    .dot-label { font-size: 9px; color: var(--text3); font-weight: 500; }

    /* ── Bottom nav ─────────────────────────────────────── */
    .bottom-nav {
      display: flex;
      padding: 2px 6px;
      padding-bottom: max(var(--sb), 8px);
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 4px;
      gap: 3px;
      background: none;
      border: none;
      color: var(--text3);
      font-size: 10px;
      font-family: inherit;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: color 0.15s;
      min-height: 44px;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* ── Modal (sheet) ──────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(58,56,51,0.28);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      display: flex;
      align-items: flex-end;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      background: var(--bg);
      border-radius: 22px 22px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 0 22px calc(max(var(--sb), 20px) + 4px);
      transform: translateY(102%);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border-empty);
      border-radius: 2px;
      margin: 14px auto 20px;
    }
    .sheet-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 22px;
    }

    /* ── Form ───────────────────────────────────────────── */
    .field { margin-bottom: 16px; }
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
    }
    .field-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 16px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      appearance: none;
      -webkit-appearance: none;
    }
    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-ring);
    }
    .field-input::placeholder { color: var(--text3); }

    .btn-row { display: flex; gap: 10px; margin-top: 6px; }
    .btn {
      flex: 1;
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      min-height: 44px;
    }
    .btn:active { opacity: 0.65; }
    .btn-ghost   { background: var(--surface2); color: var(--text2); }
    .btn-primary { background: var(--accent); color: var(--bg); flex: 2; }

    /* ── Toast ──────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(max(var(--sb), 8px) + 68px);
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--text);
      color: var(--bg);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(58,56,51,0.14);
      opacity: 0;
      transition: opacity 0.22s, transform 0.22s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
      max-width: calc(100vw - 40px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══ TODAY VIEW ════════════════════════════════════ -->
  <div class="view active" id="view-today">
    <div class="today-header">
      <div class="header-row">
        <svg class="progress-ring" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
          <circle cx="32" cy="32" r="27" fill="none" stroke="#EDE9DE" stroke-width="5"/>
          <circle id="ring-arc" cx="32" cy="32" r="27" fill="none" stroke="#B8C5A6"
            stroke-width="5" stroke-linecap="round"
            stroke-dasharray="169.6" stroke-dashoffset="169.6"
            transform="rotate(-90 32 32)"/>
          <text id="ring-label" x="32" y="32" text-anchor="middle" dominant-baseline="central">0/0</text>
        </svg>
        <div class="header-text">
          <div class="today-date-label" id="today-date"></div>
          <div class="today-greeting" id="today-greeting"></div>
        </div>
      </div>
    </div>

    <!-- hidden elements kept for JS compatibility -->
    <div class="progress-wrap" aria-hidden="true">
      <div class="progress-pct" id="progress-pct"></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div id="progress-count"></div>
    </div>

    <div class="all-done-banner" id="all-done-banner">All done for today</div>
    <div class="scroll">
      <div class="habit-list" id="habit-list"></div>
      <div class="empty-state" id="empty-today" style="display:none">
        <div class="empty-icon">✦</div>
        No habits yet.<br>Tap <strong>+ add habit</strong> below to get started.
      </div>
      <div class="add-link-wrap">
        <button class="add-link" id="open-add-today">+ add habit</button>
      </div>
    </div>
  </div>

  <!-- ═══ HISTORY VIEW ══════════════════════════════════ -->
  <div class="view" id="view-history">
    <div class="section-header">
      <div class="section-title">History</div>
    </div>
    <div class="history-controls">
      <button class="range-pill active" data-days="7">7 days</button>
      <button class="range-pill" data-days="14">14 days</button>
      <button class="range-pill" data-days="30">30 days</button>
    </div>
    <div class="scroll" style="padding-top:12px;">
      <div id="history-content"></div>
      <div class="empty-state" id="empty-history" style="display:none">
        <div class="empty-icon">📅</div>
        No habits to show yet.
      </div>
    </div>
  </div>

  <!-- ═══ MANAGE VIEW ═══════════════════════════════════ -->
  <div class="view" id="view-manage">
    <div class="section-header">
      <div class="section-title">Manage</div>
    </div>
    <div class="scroll">
      <div class="manage-list" id="manage-list"></div>
      <div class="empty-state" id="empty-manage" style="display:none">
        <div class="empty-icon">🌱</div>
        No habits yet.<br>Tap <strong>+ add habit</strong> to get started.
      </div>
      <div class="add-link-wrap">
        <button class="add-link" id="open-add-btn">+ add habit</button>
      </div>
    </div>
  </div>

  <!-- ═══ BOTTOM NAV ════════════════════════════════════ -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Today
    </button>
    <button class="nav-btn" data-view="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      History
    </button>
    <button class="nav-btn" data-view="manage">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      Manage
    </button>
  </nav>
</div>

<!-- ═══ ADD / EDIT SHEET ══════════════════════════════════ -->
<div class="overlay" id="sheet-overlay">
  <div class="sheet" id="habit-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">Add Habit</div>
    <form id="habit-form" autocomplete="off">
      <div class="field">
        <label class="field-label" for="inp-name">Habit Name</label>
        <input class="field-input" id="inp-name" type="text" placeholder="e.g. Read for 20 minutes" maxlength="80" required>
      </div>
      <div class="field">
        <label class="field-label" for="inp-dur">Duration in Minutes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input class="field-input" id="inp-dur" type="number" inputmode="numeric" placeholder="e.g. 15" min="1" max="999">
      </div>
      <div class="btn-row">
        <button type="button" class="btn btn-ghost" id="sheet-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="sheet-save">Add Habit</button>
      </div>
    </form>
  </div>
</div>

<!-- ═══ TOAST ══════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   DATA MODEL
   state.habits      = [{ id, name, duration, createdAt }]
   state.completions = { "YYYY-MM-DD": [id, id, ...] }
═══════════════════════════════════════════════════════════ */
const STORAGE_KEY = 'habitTracker_v1';
let state = { habits: [], completions: {} };
let editingId = null;
let historyDays = 7;
let toastTimer = null;
let midnightTimer = null;
let firstRender = true;

/* ── Persistence ──────────────────────────────────────── */
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch (_) {}
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* ── Date helpers ─────────────────────────────────────── */
function ds(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function today() { return ds(new Date()); }
const DAY_INIT = ['S','M','T','W','T','F','S'];

/* ── Greeting ─────────────────────────────────────────── */
function getGreeting() {
  const h = new Date().getHours();
  let base;
  if (h >= 5 && h < 12)      base = 'Good morning';
  else if (h >= 12 && h < 17) base = 'Good afternoon';
  else if (h >= 17 && h < 22) base = 'Good evening';
  else                         base = 'Working late?';
  return (state && state.userName) ? `${base}, ${state.userName}` : base;
}

/* ── Habit icon ───────────────────────────────────────── */
function habitIcon(name, isDone) {
  const n = name.toLowerCase();
  const stroke = isDone ? '#A8A496' : '#3A3833';
  const base = `width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"`;
  let inner;

  if (/language|spanish|french|duolingo|vocab/.test(n)) {
    inner = `<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>`;
  } else if (/meditat|stretch|yoga|breath/.test(n)) {
    inner = `<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 0 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>`;
  } else if (/read|book|pages/.test(n)) {
    inner = `<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>`;
  } else if (/learn|study|course|options|finance|stock/.test(n)) {
    inner = `<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>`;
  } else if (/exercise|run|gym|workout/.test(n)) {
    inner = `<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`;
  } else if (/write|journal|notes/.test(n)) {
    inner = `<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>`;
  } else {
    inner = `<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5" fill="${stroke}" stroke="none"/>`;
  }

  return `<svg class="habit-icon" ${base}>${inner}</svg>`;
}

/* ── Progress ring ────────────────────────────────────── */
function updateRing(c, n) {
  const arc   = document.getElementById('ring-arc');
  const label = document.getElementById('ring-label');
  if (!arc || !label) return;
  const circ   = 2 * Math.PI * 27;
  const offset = n > 0 ? circ * (1 - c / n) : circ;
  arc.style.strokeDasharray  = circ;
  arc.style.strokeDashoffset = offset;
  label.textContent = `${c}/${n > 0 ? n : 0}`;
}

/* ── Streaks ──────────────────────────────────────────── */
function streak(habitId) {
  const t = today();
  const todayDone = (state.completions[t] || []).includes(habitId);
  let count = 0;
  const d = new Date();
  if (todayDone) { count = 1; d.setDate(d.getDate() - 1); }
  else { d.setDate(d.getDate() - 1); }
  while ((state.completions[ds(d)] || []).includes(habitId)) {
    count++;
    d.setDate(d.getDate() - 1);
  }
  return count;
}

/* ── Completions ──────────────────────────────────────── */
function toggle(habitId) {
  const t = today();
  if (!state.completions[t]) state.completions[t] = [];
  const idx = state.completions[t].indexOf(habitId);
  if (idx >= 0) state.completions[t].splice(idx, 1);
  else state.completions[t].push(habitId);
  save();
}
function doneToday() { return state.completions[today()] || []; }

/* ── Utils ────────────────────────────────────────────── */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ── Toast ────────────────────────────────────────────── */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ═══ RENDER: TODAY ═══════════════════════════════════════ */
function renderToday() {
  const t     = today();
  const done  = doneToday();
  const habits = state.habits;
  const n = habits.length;
  const c = done.length;

  /* Date label: "SATURDAY, MAY 2" */
  const now = new Date();
  const weekday = now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
  const month   = now.toLocaleDateString('en-US', { month: 'long' }).toUpperCase();
  document.getElementById('today-date').textContent = `${weekday}, ${month} ${now.getDate()}`;
  document.getElementById('today-greeting').textContent = getGreeting();

  /* Progress ring */
  updateRing(c, n);

  /* Legacy progress elements (hidden, kept for compat) */
  const pct = n ? Math.round(c / n * 100) : 0;
  document.getElementById('progress-count').innerHTML = `<b>${c}</b> of <b>${n}</b> done today`;
  const pctEl = document.getElementById('progress-pct');
  pctEl.textContent = pct + '%';
  pctEl.classList.toggle('show', c > 0 && n > 0);
  document.getElementById('progress-fill').style.width = pct + '%';

  /* All-done banner */
  document.getElementById('all-done-banner').classList.toggle('show', n > 0 && c === n);

  const list  = document.getElementById('habit-list');
  const empty = document.getElementById('empty-today');

  if (!n) {
    list.innerHTML = '';
    empty.style.display = '';
    firstRender = false;
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = '';

  habits.forEach((habit, index) => {
    const isDone = done.includes(habit.id);
    const s = streak(habit.id);

    const item = document.createElement('div');
    item.className = 'habit-item' + (isDone ? ' done' : '');
    item.dataset.id = habit.id;
    item.setAttribute('role', 'checkbox');
    item.setAttribute('aria-checked', isDone ? 'true' : 'false');
    item.setAttribute('tabindex', '0');

    if (firstRender) {
      item.style.animation = `fadeIn 0.3s ease-in-out ${index * 40}ms both`;
    }

    /* Meta sub-line with streak in clay */
    const metaParts = [];
    if (habit.duration) metaParts.push(`<span>${habit.duration} min</span>`);
    if (s > 0) metaParts.push(`<span class="streak-accent">${s} day streak</span>`);
    const metaHtml = metaParts.length
      ? `<div class="habit-meta">${metaParts.join(' · ')}</div>`
      : '';

    item.innerHTML = `
      <div class="check-ring">
        <svg width="11" height="11" viewBox="0 0 13 13" fill="none">
          <polyline points="2,6.5 5,9.5 11,3" stroke="#FAF8F3" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      ${habitIcon(habit.name, isDone)}
      <div class="habit-body">
        <div class="habit-name">${esc(habit.name)}</div>
        ${metaHtml}
      </div>`;

    item.addEventListener('click', () => handleCheck(habit.id, item));
    item.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleCheck(habit.id, item); }
    });

    list.appendChild(item);
  });

  firstRender = false;
}

function handleCheck(habitId, item) {
  toggle(habitId);
  item.classList.add('just-checked');
  setTimeout(() => item.classList.remove('just-checked'), 500);
  renderToday();
  const done = doneToday();
  if (done.length === state.habits.length && state.habits.length > 0) {
    toast('All done for today');
  }
}

/* ═══ RENDER: MANAGE ══════════════════════════════════════ */
function renderManage() {
  const list  = document.getElementById('manage-list');
  const empty = document.getElementById('empty-manage');
  list.innerHTML = '';

  if (!state.habits.length) { empty.style.display = ''; return; }
  empty.style.display = 'none';

  state.habits.forEach(habit => {
    const item = document.createElement('div');
    item.className = 'manage-item';
    const sub = habit.duration ? `${habit.duration} min` : '';
    item.innerHTML = `
      <div class="manage-item-body">
        <div class="manage-name">${esc(habit.name)}</div>
        <div class="manage-sub">${sub}</div>
      </div>
      <div class="manage-actions">
        <button class="icon-btn edit" data-action="edit" data-id="${habit.id}" aria-label="Edit">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/>
          </svg>
        </button>
        <button class="icon-btn del" data-action="delete" data-id="${habit.id}" aria-label="Delete">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
      </div>`;
    list.appendChild(item);
  });
}

/* ═══ RENDER: HISTORY ═════════════════════════════════════ */
function renderHistory() {
  const content = document.getElementById('history-content');
  const empty   = document.getElementById('empty-history');

  if (!state.habits.length) { content.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  content.innerHTML = '';

  const todayDate = new Date();
  const todayS    = today();
  const days = [];
  for (let i = historyDays - 1; i >= 0; i--) {
    const d = new Date(todayDate);
    d.setDate(d.getDate() - i);
    days.push(d);
  }

  state.habits.forEach(habit => {
    const s = streak(habit.id);
    const block = document.createElement('div');
    block.className = 'history-block';

    const streakHtml = s > 0
      ? `<span class="history-streak-label${s >= 7 ? ' hot' : ''}">${s} day streak</span>`
      : '';

    block.innerHTML = `
      <div class="history-top">
        <div class="history-habit-name">${esc(habit.name)}</div>
        ${streakHtml}
      </div>
      <div class="dot-row" id="dots-${habit.id}"></div>`;

    content.appendChild(block);

    const row = block.querySelector(`#dots-${habit.id}`);
    days.forEach(d => {
      const s2     = ds(d);
      const isDone = (state.completions[s2] || []).includes(habit.id);
      const isToday = s2 === todayS;
      const col = document.createElement('div');
      col.className = 'dot-col';
      col.innerHTML = `
        <div class="dot${isDone ? ' done' : ''}${isToday ? ' today' : ''}"></div>
        <div class="dot-label">${DAY_INIT[d.getDay()]}</div>`;
      row.appendChild(col);
    });
  });
}

/* ═══ SHEET (modal) ═══════════════════════════════════════ */
function openSheet(id = null) {
  editingId = id;
  const habit = id ? state.habits.find(h => h.id === id) : null;
  document.getElementById('sheet-title').textContent  = id ? 'Edit Habit' : 'Add Habit';
  document.getElementById('sheet-save').textContent   = id ? 'Save Changes' : 'Add Habit';
  document.getElementById('inp-name').value  = habit ? habit.name : '';
  document.getElementById('inp-dur').value   = habit?.duration || '';
  document.getElementById('sheet-overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-name').focus(), 380);
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  editingId = null;
}

/* ═══ CRUD ════════════════════════════════════════════════ */
function saveHabit(name, duration) {
  if (editingId) {
    const h = state.habits.find(h => h.id === editingId);
    if (h) { h.name = name; h.duration = duration; }
    toast('Habit updated');
  } else {
    state.habits.push({ id: uid(), name, duration, createdAt: today() });
    toast('Habit added');
  }
  save();
  renderAll();
  closeSheet();
}

function deleteHabit(id) {
  const habit = state.habits.find(h => h.id === id);
  if (!habit) return;
  if (!confirm(`Delete "${habit.name}"?\n\nYour history will be kept.`)) return;
  state.habits = state.habits.filter(h => h.id !== id);
  save();
  renderAll();
  toast('Habit deleted');
}

/* ═══ NAVIGATION ══════════════════════════════════════════ */
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelector(`.nav-btn[data-view="${name}"]`).classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'manage')  renderManage();
}

function renderAll() {
  renderToday();
  if (document.getElementById('view-manage').classList.contains('active'))  renderManage();
  if (document.getElementById('view-history').classList.contains('active')) renderHistory();
}

/* ═══ MIDNIGHT RESET ══════════════════════════════════════ */
function scheduleMidnight() {
  clearTimeout(midnightTimer);
  const now  = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 2);
  midnightTimer = setTimeout(() => { renderAll(); scheduleMidnight(); }, next - now);
}

/* ═══ INIT ════════════════════════════════════════════════ */
function init() {
  load();

  /* Seed default habits on first launch */
  if (!state.habits.length && !localStorage.getItem('habitTracker_seeded')) {
    state.habits = [
      { id: uid(), name: 'Duolingo Spanish', duration: 15, createdAt: today() },
      { id: uid(), name: 'Learn stock options', duration: 10, createdAt: today() },
    ];
    localStorage.setItem('habitTracker_seeded', '1');
    save();
  }

  renderToday();

  /* Nav */
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });

  /* Manage: event delegation */
  document.getElementById('manage-list').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    if (btn.dataset.action === 'edit')   openSheet(btn.dataset.id);
    if (btn.dataset.action === 'delete') deleteHabit(btn.dataset.id);
  });

  /* Add habit buttons */
  document.getElementById('open-add-btn').addEventListener('click',   () => openSheet());
  document.getElementById('open-add-today').addEventListener('click', () => openSheet());

  /* Sheet */
  document.getElementById('sheet-cancel').addEventListener('click', closeSheet);
  document.getElementById('sheet-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('sheet-overlay')) closeSheet();
  });

  /* Form */
  document.getElementById('habit-form').addEventListener('submit', e => {
    e.preventDefault();
    const name = document.getElementById('inp-name').value.trim();
    if (!name) return;
    const dur = parseInt(document.getElementById('inp-dur').value) || null;
    saveHabit(name, dur);
  });

  /* History range pills */
  document.querySelectorAll('.range-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.range-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      historyDays = parseInt(pill.dataset.days);
      renderHistory();
    });
  });

  scheduleMidnight();

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') renderAll();
  });
}

/* ═══ SERVICE WORKER ══════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
